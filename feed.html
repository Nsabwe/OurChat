<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OurMarket</title>

<style>
:root { font-size: 14px; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: white;
  color: #555;
}

/* TOPBAR */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.7rem 1rem;
  border-bottom: 1px solid gray;
}

.left-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

.back-btn {
  font-size: 18px;
  color: white;
  background: green;
  border: none;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  cursor: pointer;
}

.logo { font-size: 1.2rem; color: green; font-weight: bold; }

.top-right { display: flex; gap: 0.5rem; }

.sell-btn, .login-btn {
  padding: 0.4rem 0.7rem;
  font-size: 0.8rem;
  border-radius: 15px;
  border: none;
  cursor: pointer;
}

.sell-btn { background: green; color: white; }
.login-btn { background: green; }

/* SEARCH */
.search-container {
  display: flex;
  justify-content: center;
  margin: 0.8rem;
}

.search-box {
  display: flex;
  width: 95%;
  max-width: 500px;
  border: 1px solid gray;
  border-radius: 25px;
  overflow: hidden;
}

.search-box input {
  flex: 1;
  padding: 0.5rem;
  border: none;
  outline: none;
}

.search-btn {
  padding: 0 0.8rem;
  background: green;
  color: white;
  border: none;
}

/* CATEGORIES */
.categories {
  display: flex;
  overflow-x: auto;
  gap: 1rem;
  padding: 0.5rem 1rem;
}

.category {
  font-size: 0.8rem;
  color: black;
  cursor: pointer;
}

.category.active {
  border-bottom: 2px solid green;
}

/* PRODUCTS GRID */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  padding: 10px;
}

.product {
  background: #f5f5f5;
  border-radius: 10px;
  padding: 8px;
  border: 1px solid gray;
  cursor: pointer;
}

.product img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 8px;
}

.product h4 {
  margin: 5px 0;
  color: green;
}

/* MODAL (FIXED RESPONSIVE) */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;

  /* FIX */
  padding: 10px;
  overflow-y: auto;
}

.hidden { display: none; }

.modal-content {
  background: white;
  width: 95%;
  max-width: 700px;
  border-radius: 12px;
  padding: 10px;
  position: relative;

  /* FIX */
  max-height: 95vh;
  overflow-y: auto;
}

.modal-close {
  position: absolute;
  top: 10px;
  right: 10px;
  background: red;
  color: white;
  border: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
}

.modal img {
  width: 100%;
  max-height: 60vh; /* FIX */
  object-fit: cover;
  border-radius: 10px;
}

/* SMALL PHONE TWEAK (no design change) */
@media (max-width: 480px) {
  .modal-content {
    padding: 8px;
  }

  .modal-close {
    width: 26px;
    height: 26px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="left-top">
    <button class="back-btn" onclick="location.href='index.html'">←</button>
    <div class="logo">OurMarket</div>
  </div>

  <div class="top-right">
    <button class="sell-btn" onclick="location.href='sell.html'">Sell</button>
    <button class="login-btn" onclick="location.href='login.html'">Login</button>
  </div>
</div>

<div class="search-container">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search by name or location...">
    <button class="search-btn" onclick="loadProducts()">Go</button>
  </div>
</div>

<div class="categories">
  <div class="category active" onclick="filterCategory('all', this)">All</div>
  <div class="category" onclick="filterCategory('phone', this)">Phone</div>
  <div class="category" onclick="filterCategory('clothes', this)">Clothes</div>
  <div class="category" onclick="filterCategory('car', this)"></div>
  <div class="category" onclick="filterCategory('land', this)">Land</div>
  <div class="category" onclick="filterCategory('others', this)">Others</div>
</div>

<div class="products" id="productList"></div>

<div id="modal" class="modal hidden">
  <div class="modal-content">
    <button class="modal-close" id="closeModal">✖</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
let currentCategory = "all";
let selectedProduct = null;
let imageMode = false;

/* LOAD PRODUCTS */
async function loadProducts() {
  const list = document.getElementById("productList");
  const search = document.getElementById("searchInput").value.trim();

  list.innerHTML = "<p style='padding:10px;'>Loading...</p>";

  try {
    let url = `https://feedserver-7.onrender.com/api/products?category=${currentCategory}`;
    if (search) url += `&name=${encodeURIComponent(search)}`;

    const res = await fetch(url);
    const data = await res.json();

    display(data);

  } catch (err) {
    list.innerHTML = "<p style='padding:10px;color:red;'>Failed to load products</p>";
  }
}

/* DISPLAY */
function display(products) {
  const list = document.getElementById("productList");
  list.innerHTML = "";

  products.forEach(p => {
    const div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      <img src="${p.images?.[0] || 'https://via.placeholder.com/150'}">
      <h4>${p.name || ""}</h4>
      <p>${p.priceText || ""}</p>
    `;

    div.onclick = () => openProduct(p);
    list.appendChild(div);
  });
}

/* OPEN PRODUCT */
function openProduct(p) {
  selectedProduct = p;
  imageMode = false;

  document.getElementById("modalBody").innerHTML = `
    <img id="mainImg" src="${p.images?.[0] || ''}">
    <h3>${p.name}</h3>
    <p><b>Price:</b> ${p.priceText}</p>
    <p><b>Phone:</b> ${p.phone}</p>
    <p><b>Location:</b> ${p.location}</p>
    <p style="color:green;">Tap image to view full screen</p>
  `;

  document.getElementById("modal").classList.remove("hidden");

  document.getElementById("mainImg").onclick = () => {
    imageMode = true;
    document.getElementById("modalBody").innerHTML = `
      <img src="${p.images?.[0] || ''}" style="width:100%;height:auto;">
    `;
  };
}

/* CLOSE BUTTON */
document.getElementById("closeModal").onclick = () => {
  if (imageMode) {
    openProduct(selectedProduct);
  } else {
    document.getElementById("modal").classList.add("hidden");
  }
};

/* CLICK OUTSIDE CLOSE */
document.getElementById("modal").onclick = (e) => {
  if (e.target.id === "modal") {
    document.getElementById("modal").classList.add("hidden");
  }
};

/* CATEGORY */
function filterCategory(category, el) {
  document.querySelectorAll(".category").forEach(c => c.classList.remove("active"));
  el.classList.add("active");

  currentCategory = category;
  loadProducts();
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", () => {
  clearTimeout(window.t);
  window.t = setTimeout(loadProducts, 400);
});

/* INIT */
loadProducts();
</script>

</body>
</html>
